[general]
static=yes
writeprotect=no

[ivr-main]
exten => s,1,Answer()
 same => n,Set(TIMEOUT(digit)=5)
 same => n,Set(TIMEOUT(response)=10)
 same => n,Background(ivr-welcome)
 same => n,WaitExten()

exten => 1,1,Goto(queues,support,1)
exten => 2,1,Goto(queues,sales,1)
exten => i,1,Playback(invalid)
 same => n,Goto(s,1)
